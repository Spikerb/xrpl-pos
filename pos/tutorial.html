ontents", "toc1": "1. Introduction and system overview", "toc2": "2. Installing the Xaman wallet", "toc21": "2.1 Downloading the app", "toc22": "2.2 Creating a new wallet", "toc23": "2.3 Seed phrase backup", "toc3": "3. Xaman API setup (for merchants)", "toc31": "3.1 Logging into Developer Console", "toc32": "3.2 Creating an app and getting API keys", "toc33": "3.3 Setting up API keys and wallet address in XRPL POS", "toc4": "4. Installing and launching XRPL POS", "toc41": "4.1 Opening the app", "toc42": "4.2 Setting up XRP address", "toc43": "4.3 Currency and other settings", "toc44": "4.4 License activation", "toc5": "5. Accepting payments", "toc51": "5.1 Entering the amount", "toc52": "5.2 Generating QR code", "toc53": "5.3 Customer payment", "toc54": "5.4 Payment confirmation", "toc6": "6. Payment history and statistics", "toc7": "7. Troubleshooting", "toc8": "8. Support", "s1_title": "1. Introduction and system overview", "s1_p1": "XRPL POS is a web-based point of sale that allows merchants to accept XRP cryptocurrency payments directly to their XRP wallet. No installation required — runs directly in the browser on computer, tablet or mobile phone.", "s1_adv": "Key advantages:", "s1_a1": "No transaction fees (only standard XRP network fee ~0.00001 XRP)", "s1_a2": "Instant payments — transaction confirmed in 3–5 seconds", "s1_a3": "Automatic conversion of fiat currencies to XRP at current rates", "s1_a4": "Currency support: CZK, USD, EUR, GBP, HUF, PLN, CHF, JPY", "s1_a5": "QR code for easy wallet scanning", "s1_a6": "Payment history with blockchain link", "s1_need": "What you will need:", "s1_n1": "Xaman (XUMM) wallet installed on mobile", "s1_n2": "XRP address (generated in Xaman, activated with 2 XRP reserve)", "s1_n3": "API keys from Xaman Developer Console (for full functionality)", "s1_n4": "Internet access", "s2_title": "2. Installing the Xaman wallet", "s2_p1": "Xaman (formerly XUMM) is the most popular self-custody wallet for XRP Ledger. Customers use it to pay by scanning a QR code in the store.", "s2_p2": "Xaman is available free for Android and iOS.", "s21_title": "2.1 Downloading the app", "s21_c1": "Open xaman.app/download in your mobile browser", "s21_c2": "Click \"GET IT ON Google Play\" (Android) or \"Download on the App Store\" (iOS)", "s21_c3": "Install the app normally", "s21_tip": "💡 TIP: Always download Xaman only from the official website xaman.app or directly from the store — avoid fraudulent apps.", "s22_title": "2.2 Creating a new wallet", "s22_c1": "Open the Xaman app", "s22_c2": "Select \"Create a new account\"", "s22_c3": "The app will generate your unique XRP address (starts with the letter \"r\")", "s22_c4": "Copy this address — you will need it in XRPL POS settings", "s22_warn": "⚠️ A new wallet needs activation with a minimum of 2 XRP. Without this balance, payments cannot be received.", "s23_title": "2.3 Seed phrase backup", "s23_c1": "Xaman will prompt you to backup \"Secret Numbers\" (24 numbers)", "s23_c2": "Write these numbers on paper and store them in a safe place", "s23_c3": "Never send them electronically or share with anyone", "s23_warn": "⚠️ Without the seed phrase backup, wallet access cannot be restored if the phone is lost!", "s3_title": "3. Xaman API setup (for merchants)", "s3_p1": "The Xaman API allows XRPL POS to send payment requests directly to the customer's wallet and monitor payment status in real time.", "s31_title": "3.1 Logging into Developer Console", "s31_c1": "Open apps.xaman.dev in your browser", "s31_c2": "Click the \"Sign in with Xaman\" button", "s31_c3": "A login QR code will appear — scan it with the Xaman mobile app", "s31_c4": "Confirm the Sign In request in the Xaman app", "s31_c5": "The browser will log you in automatically", "s32_title": "3.2 Creating an app and getting API keys", "s32_p1": "After first login you will see an empty dashboard with no applications.", "s32_c1": "Click the \"Create new application\" button", "s32_c2": "Fill in the application name (e.g. \"XRPL POS Shop\")", "s32_c3": "Fill in the application description", "s32_c4": "Optionally upload a logo (square image)", "s32_c5": "Click \"Create application\"", "s32_p2": "After creation, your API keys will be displayed:", "s32_warn": "⚠️ The API Secret is shown ONLY ONCE! Copy it immediately and store it safely.", "s32_k1": "API Key — public identifier (can be viewed anytime in settings)", "s32_k2": "API Secret — private key (not visible again after closing the page)", "s32_p3": "In the application Settings you can always view the API Key and generate a new API Secret if needed.", "s33_title": "3.3 Setting up API keys and wallet address in XRPL POS", "s33_p1": "After obtaining the API keys from Xaman Developer Console, you need to enter everything into the XRPL POS settings. All settings are done in the Settings tab (gear icon).", "s33_step1": "Step 1 — XRP recipient address", "s33_s1p": "Your XRP address is your wallet identifier on the blockchain. All customer payments will arrive at this address.", "s33_c1": "In XRPL POS go to the \"Settings\" tab (gear icon at the bottom)", "s33_c2": "In the \"🔑 WALLET\" section find the \"XRP recipient address\" field", "s33_c3": "Open the Xaman app on your phone and copy your XRP address", "s33_c4": "The address always starts with the letter \"r\" — for example: rEyyuAVenfbZKkCWb6...", "s33_c5": "Paste the address into the \"XRP recipient address\" field", "s33_c6": "Optionally fill in \"Destination Tag\" — used for payments to exchanges", "s33_w1": "⚠️ Enter the address exactly — a wrong address means payments will not arrive in your account!", "s33_t1": "💡 TIP: Copy the address directly from the Xaman app, never type it manually.", "s33_step2": "Step 2 — API keys", "s33_s2p": "API keys connect the POS to your Xaman application. After generating a QR code, the customer receives a push notification directly in their Xaman wallet.", "s33_d1": "In settings find the \"🔑 XUMM / XAMAN API\" section", "s33_d2": "Paste the API Key from apps.xaman.dev into the \"API Key\" field", "s33_d3": "Paste the API Secret into the \"API Secret\" field (saved in the previous step)", "s33_t2": "💡 TIP: Keys are stored only locally in your browser. They are never sent to any server.", "s33_step3": "Step 3 — Saving settings", "s33_e1": "After filling in all fields, scroll down to the large teal \"💾 Save settings\" button", "s33_e2": "Click the button — settings will be saved to the browser", "s33_e3": "The app will automatically connect to the XRPL network", "s33_e4": "In \"XRPL NETWORK\" → WebSocket log you will see \"✓ WS connected\" and \"✓ CoinGecko XRP: $X.XX\"", "s33_w2": "⚠️ If you don't see a green connection in the WebSocket log after saving, check the XRP address and internet connection.", "s33_sects": "XRPL POS settings sections:", "s33_se1": "🔑 WALLET — Your XRP address and Destination Tag", "s33_se2": "💱 DISPLAY CURRENCY — Primary fiat currency (CZK, USD, EUR, GBP, HUF, PLN)", "s33_se3": "🔑 XUMM / XAMAN API — API Key and API Secret from Xaman Developer Console", "s33_se4": "📊 RATES — CoinGecko Token ID and payment tolerance (%)", "s33_se5": "🔒 SECURITY — PIN protection, checksum, HTTPS", "s33_se6": "🌐 XRPL NETWORK — Mainnet / Testnet, WebSocket log", "s33_se7": "🏪 SHOP NAME — Your store name", "s33_se8": "🌍 LANGUAGE — App language (42 languages)", "s4_title": "4. Installing and launching XRPL POS", "s41_title": "4.1 Opening the app", "s41_c1": "Open a browser (Chrome, Firefox, Edge or Safari)", "s41_c2": "Go to: www.xrplpos.cz", "s41_c3": "The app loads automatically — no installation required", "s41_tip": "💡 TIP: For faster access, add the app to your mobile home screen.", "s42_title": "4.2 Setting up XRP address", "s42_p": "Detailed instructions for setting up the XRPL address are in chapter 3.3 — Step 1.", "s43_title": "4.3 Currency and other settings", "s43_curr": "In the \"Display Currency\" section select your primary fiat currency:", "s43_c1": "CZK — Czech Koruna", "s43_c2": "USD — US Dollar", "s43_c3": "EUR — Euro", "s43_c4": "GBP — British Pound", "s43_c5": "HUF — Hungarian Forint", "s43_c6": "PLN — Polish Zloty", "s43_rates": "In the \"Rates\" section:", "s43_r1": "CoinGecko Token ID — default value \"ripple\" is correct, do not change", "s43_r2": "Payment tolerance — recommended value 0.5% (payments up to 0.5% below required amount are accepted)", "s43_sec": "In the \"Security\" section:", "s43_s1": "PIN — set a 4-digit PIN to protect access to the POS", "s43_s2": "Checksum — verification number of your address", "s44_title": "4.4 License activation", "s44_c1": "Go to the \"License\" tab (key icon at the bottom)", "s44_c2": "Enter your license key", "s44_c3": "Click \"Activate license\"", "s44_c4": "After activation your plan and domain will be displayed", "s44_tip": "💡 TIP: Without a license the app works in trial mode for 14 days. To purchase a license visit www.xrplpos.cz/pos/license.html", "s5_title": "5. Accepting payments", "s51_title": "5.1 Entering the amount", "s51_c1": "Use the numeric keypad to enter the required amount", "s51_c2": "Select the currency from the row of buttons (CZK, USD, EUR...)", "s51_c3": "The app automatically shows the conversion to XRP at the current rate", "s51_c4": "Optionally fill in a payment description", "s51_modes": "Input modes:", "s51_m1": "⚡ XRP — enter amount directly in XRP", "s51_m2": "💶 Fiat → XRP — enter in fiat currency with automatic conversion", "s52_title": "5.2 Generating QR code", "s52_c1": "After entering the amount click \"GENERATE PAYMENT\"", "s52_c2": "The QR code contains the address, amount, tag and description", "s52_c3": "Status shows \"⏳ Waiting for payment...\"", "s52_c4": "Below the QR code you can see the recipient address with checksum", "s53_title": "5.3 Customer payment", "s53_c1": "Customer opens Xaman on their phone", "s53_c2": "Scans the QR code", "s53_c3": "Reviews payment details and confirms", "s53_tip": "💡 TIP: The customer can use any XRPL wallet — Xaman, GemWallet, Crossmark etc.", "s54_title": "5.4 Payment confirmation", "s54_c1": "✅ \"Payment received!\" — payment accepted", "s54_c2": "TX hash for verification on XRPL Explorer", "s54_c3": "\"New payment\" — immediately accept the next payment", "s6_title": "6. Payment history and statistics", "s6_p1": "At the bottom of the main screen is a list of recent payments. Each record shows the date, time, fiat amount and transaction hash.", "s6_p2": "The \"Statistics\" tab shows total turnover, number of transactions, average and highest payment. Data can be exported to CSV for accounting.", "s7_title": "7. Troubleshooting", "s7_p1": "Rates not loading:", "s7_c1": "Check your internet connection", "s7_c2": "Click \"Refresh rates\" in settings", "s7_c3": "Wait a minute and try again", "s7_p2": "WebSocket not connecting:", "s7_d1": "Check internet connection", "s7_d2": "Click \"Connect\" in settings", "s7_d3": "Verify the correctness of the XRPL address", "s7_p3": "Payment not received:", "s7_e1": "Verify the transaction on livenet.xrpl.org using the TX hash", "s7_e2": "Check the XRPL address in settings", "s7_e3": "Check Payment tolerance setting", "s7_p4": "QR code not generating / API error:", "s7_f1": "Verify API Key and API Secret in settings", "s7_f2": "Check app validity at apps.xaman.dev", "s7_f3": "If API Secret is lost, generate a new one in Xaman Developer Console", "s8_title": "8. Support", "s8_p1": "We are here for you. For technical issues or questions contact us:", "s8_tg": "📧 Telegram:", "s8_chat": "💬 Live chat:", "footer": "© 2026 XRPL POS | All rights reserved | xrplpos.cz"}, "de": {"title": "XRPL POS — Tutorial", "h_main": "⚡ XRPL POS", "h_sub": "Vollständiges Benutzerhandbuch", "h_sub2": "Von der Installation der Xaman-Wallet bis zur ersten Zahlung", "h_ver": "Version 1.0 | 2026 | www.xrplpos.cz", "toc": "Inhaltsverzeichnis", "toc1": "1. Einführung und Systemübersicht", "toc2": "2. Installation der Xaman-Wallet", "toc21": "2.1 App herunterladen", "toc22": "2.2 Neue Wallet erstellen", "toc23": "2.3 Seed-Phrase-Backup", "toc3": "3. Xaman API-Einrichtung (für Händler)", "toc31": "3.1 Anmeldung bei der Developer Console", "toc32": "3.2 App erstellen und API-Schlüssel erhalten", "toc33": "3.3 API-Schlüssel und Wallet-Adresse in XRPL POS einrichten", "toc4": "4. XRPL POS installieren und starten", "toc41": "4.1 App öffnen", "toc42": "4.2 XRP-Adresse einrichten", "toc43": "4.3 Währung und weitere Einstellungen", "toc44": "4.4 Lizenzaktivierung", "toc5": "5. Zahlungen annehmen", "toc51": "5.1 Betrag eingeben", "toc52": "5.2 QR-Code generieren", "toc53": "5.3 Kundenzahlung", "toc54": "5.4 Zahlungsbestätigung", "toc6": "6. Zahlungshistorie und Statistiken", "toc7": "7. Fehlerbehebung", "toc8": "8. Support", "s1_title": "1. Einführung und Systemübersicht", "s1_p1": "XRPL POS ist eine webbasierte Kasse, die Händlern ermöglicht, XRP-Zahlungen direkt auf ihre Wallet zu empfangen. Keine Installation nötig — läuft im Browser auf Computer, Tablet oder Handy.", "s1_adv": "Hauptvorteile:", "s1_a1": "Keine Transaktionsgebühren (nur Standard-XRP-Netzwerkgebühr ~0,00001 XRP)", "s1_a2": "Sofortzahlungen — Transaktion in 3–5 Sekunden bestätigt", "s1_a3": "Automatische Umrechnung von Fiat in XRP zum aktuellen Kurs", "s1_a4": "Währungsunterstützung: CZK, USD, EUR, GBP, HUF, PLN, CHF, JPY", "s1_a5": "QR-Code zum einfachen Scannen mit der Wallet", "s1_a6": "Zahlungshistorie mit Blockchain-Link", "s1_need": "Was Sie benötigen:", "s1_n1": "Xaman (XUMM) Wallet auf dem Handy installiert", "s1_n2": "XRP-Adresse (in Xaman generiert, mit 2 XRP Reserve aktiviert)", "s1_n3": "API-Schlüssel von der Xaman Developer Console", "s1_n4": "Internetzugang", "s2_title": "2. Installation der Xaman-Wallet", "s2_p1": "Xaman (früher XUMM) ist die beliebteste Self-Custody-Wallet für XRP Ledger. Kunden nutzen sie zum Bezahlen durch QR-Code-Scannen.", "s2_p2": "Xaman ist kostenlos für Android und iOS verfügbar.", "s21_title": "2.1 App herunterladen", "s21_c1": "Öffnen Sie xaman.app/download im Mobilbrowser", "s21_c2": "Klicken Sie auf \"GET IT ON Google Play\" oder \"Download on the App Store\"", "s21_c3": "Installieren Sie die App normal", "s21_tip": "💡 TIPP: Laden Sie Xaman immer nur von xaman.app oder dem offiziellen Store herunter.", "s22_title": "2.2 Neue Wallet erstellen", "s22_c1": "Öffnen Sie die Xaman-App", "s22_c2": "Wählen Sie \"Create a new account\"", "s22_c3": "Die App generiert Ihre eindeutige XRP-Adresse (beginnt mit \"r\")", "s22_c4": "Kopieren Sie diese Adresse — Sie benötigen sie in den XRPL POS-Einstellungen", "s22_warn": "⚠️ Eine neue Wallet benötigt mindestens 2 XRP zur Aktivierung. Ohne dieses Guthaben können keine Zahlungen empfangen werden.", "s23_title": "2.3 Seed-Phrase-Backup", "s23_c1": "Xaman fordert Sie auf, \"Secret Numbers\" (24 Nummern) zu sichern", "s23_c2": "Schreiben Sie diese Nummern auf Papier und bewahren Sie sie sicher auf", "s23_c3": "Senden Sie sie niemals elektronisch oder teilen Sie sie mit jemandem", "s23_warn": "⚠️ Ohne Seed-Phrase-Backup kann der Zugang zur Wallet bei Handyverlust nicht wiederhergestellt werden!", "s3_title": "3. Xaman API-Einrichtung (für Händler)", "s3_p1": "Die Xaman API ermöglicht XRPL POS, Zahlungsanfragen direkt an die Wallet des Kunden zu senden und den Zahlungsstatus in Echtzeit zu überwachen.", "s31_title": "3.1 Anmeldung bei der Developer Console", "s31_c1": "Öffnen Sie apps.xaman.dev im Browser", "s31_c2": "Klicken Sie auf \"Sign in with Xaman\"", "s31_c3": "Ein QR-Code erscheint — scannen Sie ihn mit der Xaman-App", "s31_c4": "Bestätigen Sie die Sign-In-Anfrage in der Xaman-App", "s31_c5": "Der Browser meldet Sie automatisch an", "s32_title": "3.2 App erstellen und API-Schlüssel erhalten", "s32_p1": "Nach der ersten Anmeldung sehen Sie ein leeres Dashboard.", "s32_c1": "Klicken Sie auf \"Create new application\"", "s32_c2": "Geben Sie den Anwendungsnamen ein (z.B. \"XRPL POS Laden\")", "s32_c3": "Geben Sie eine Beschreibung ein", "s32_c4": "Laden Sie optional ein Logo hoch", "s32_c5": "Klicken Sie auf \"Create application\"", "s32_p2": "Nach der Erstellung werden Ihre API-Schlüssel angezeigt:", "s32_warn": "⚠️ Der API Secret wird NUR EINMAL angezeigt! Kopieren Sie ihn sofort und bewahren Sie ihn sicher auf.", "s32_k1": "API Key — öffentlicher Bezeichner (jederzeit in den Einstellungen einsehbar)", "s32_k2": "API Secret — privater Schlüssel (nach dem Schließen nicht mehr sichtbar)", "s32_p3": "In den App-Einstellungen können Sie den API Key jederzeit anzeigen und bei Bedarf einen neuen API Secret generieren.", "s33_title": "3.3 API-Schlüssel und Wallet-Adresse in XRPL POS einrichten", "s33_p1": "Nach Erhalt der API-Schlüssel müssen diese in die XRPL POS-Einstellungen eingegeben werden. Alle Einstellungen erfolgen im Tab Einstellungen (Zahnrad-Symbol).", "s33_step1": "Schritt 1 — XRP Empfängeradresse", "s33_s1p": "Ihre XRP-Adresse ist Ihre Wallet-Kennung auf der Blockchain. Alle Kundenzahlungen gehen an diese Adresse.", "s33_c1": "Gehen Sie in XRPL POS zum Tab \"Einstellungen\" (Zahnrad-Symbol unten)", "s33_c2": "Im Bereich \"🔑 WALLET\" finden Sie das Feld \"XRP-Empfängeradresse\"", "s33_c3": "Öffnen Sie die Xaman-App und kopieren Sie Ihre XRP-Adresse", "s33_c4": "Die Adresse beginnt immer mit \"r\" — z.B.: rEyyuAVenfbZKkCWb6...", "s33_c5": "Fügen Sie die Adresse in das Feld ein", "s33_c6": "Optional: \"Destination Tag\" für Zahlungen an Börsen", "s33_w1": "⚠️ Geben Sie die Adresse genau ein — eine falsche Adresse bedeutet, dass Zahlungen nicht ankommen!", "s33_t1": "💡 TIPP: Kopieren Sie die Adresse direkt aus der Xaman-App.", "s33_step2": "Schritt 2 — API-Schlüssel", "s33_s2p": "API-Schlüssel verbinden die Kasse mit Ihrer Xaman-App. Nach der QR-Code-Generierung erhält der Kunde eine Push-Benachrichtigung.", "s33_d1": "Finden Sie den Bereich \"🔑 XUMM / XAMAN API\"", "s33_d2": "Fügen Sie den API Key aus apps.xaman.dev ein", "s33_d3": "Fügen Sie den API Secret ein (im vorherigen Schritt gespeichert)", "s33_t2": "💡 TIPP: Schlüssel werden nur lokal im Browser gespeichert. Sie werden nie an einen Server gesendet.", "s33_step3": "Schritt 3 — Einstellungen speichern", "s33_e1": "Scrollen Sie zur großen Schaltfläche \"💾 Einstellungen speichern\"", "s33_e2": "Klicken Sie — Einstellungen werden im Browser gespeichert", "s33_e3": "Die App verbindet sich automatisch mit dem XRPL-Netzwerk", "s33_e4": "Im WebSocket-Log sehen Sie \"✓ WS verbunden\" und \"✓ CoinGecko XRP: $X.XX\"", "s33_w2": "⚠️ Keine grüne Verbindung nach dem Speichern? XRP-Adresse und Internetverbindung prüfen.", "s33_sects": "XRPL POS Einstellungsbereiche:", "s33_se1": "🔑 WALLET — XRP-Adresse und Destination Tag", "s33_se2": "💱 DISPLAY CURRENCY — Primäre Fiat-Währung", "s33_se3": "🔑 XUMM / XAMAN API — API Key und API Secret", "s33_se4": "📊 RATES — CoinGecko Token ID und Zahlungstoleranz", "s33_se5": "🔒 SECURITY — PIN-Schutz, Prüfsumme, HTTPS", "s33_se6": "🌐 XRPL NETWORK — Mainnet / Testnet, WebSocket-Log", "s33_se7": "🏪 SHOP NAME — Geschäftsname", "s33_se8": "🌍 LANGUAGE — App-Sprache (42 Sprachen)", "s4_title": "4. XRPL POS installieren und starten", "s41_title": "4.1 App öffnen", "s41_c1": "Öffnen Sie einen Browser (Chrome, Firefox, Edge oder Safari)", "s41_c2": "Gehen Sie zu: www.xrplpos.cz", "s41_c3": "Die App lädt automatisch — keine Installation erforderlich", "s41_tip": "💡 TIPP: Fügen Sie die App für schnelleren Zugriff zum Startbildschirm hinzu.", "s42_title": "4.2 XRP-Adresse einrichten", "s42_p": "Detaillierte Anweisungen zur Einrichtung der XRPL-Adresse finden Sie in Kapitel 3.3 — Schritt 1.", "s43_title": "4.3 Währung und weitere Einstellungen", "s43_curr": "Wählen Sie Ihre primäre Fiat-Währung:", "s43_c1": "CZK — Tschechische Krone", "s43_c2": "USD — US-Dollar", "s43_c3": "EUR — Euro", "s43_c4": "GBP — Britisches Pfund", "s43_c5": "HUF — Ungarischer Forint", "s43_c6": "PLN — Polnischer Zloty", "s43_rates": "Im Bereich \"Rates\":", "s43_r1": "CoinGecko Token ID — Standardwert \"ripple\" nicht ändern", "s43_r2": "Zahlungstoleranz — empfohlen 0,5%", "s43_sec": "Im Bereich \"Security\":", "s43_s1": "PIN — 4-stellige PIN setzen", "s43_s2": "Prüfsumme — Verifizierungsnummer Ihrer Adresse", "s44_title": "4.4 Lizenzaktivierung", "s44_c1": "Gehen Sie zum Tab \"Lizenz\" (Schlüssel-Symbol unten)", "s44_c2": "Geben Sie Ihren Lizenzschlüssel ein", "s44_c3": "Klicken Sie auf \"Lizenz aktivieren\"", "s44_c4": "Nach der Aktivierung werden Plan und Domain angezeigt", "s44_tip": "💡 TIPP: Ohne Lizenz funktioniert die App 14 Tage im Trial-Modus. Lizenz kaufen: www.xrplpos.cz/pos/license.html", "s5_title": "5. Zahlungen annehmen", "s51_title": "5.1 Betrag eingeben", "s51_c1": "Geben Sie den Betrag über die Zahlentastatur ein", "s51_c2": "Wählen Sie die Währung aus der Schaltflächenreihe", "s51_c3": "Die App zeigt automatisch die Umrechnung in XRP", "s51_c4": "Optional: Zahlungsbeschreibung ausfüllen", "s51_modes": "Eingabemodi:", "s51_m1": "⚡ XRP — Betrag direkt in XRP", "s51_m2": "💶 Fiat → XRP — in Fiat-Währung mit automatischer Umrechnung", "s52_title": "5.2 QR-Code generieren", "s52_c1": "Auf \"GENERATE PAYMENT\" klicken", "s52_c2": "QR-Code enthält Adresse, Betrag, Tag und Beschreibung", "s52_c3": "Status: \"⏳ Waiting for payment...\"", "s52_c4": "Unter dem QR-Code: Empfängeradresse mit Prüfsumme", "s53_title": "5.3 Kundenzahlung", "s53_c1": "Kunde öffnet Xaman auf dem Handy", "s53_c2": "Scannt den QR-Code", "s53_c3": "Überprüft Details und bestätigt", "s53_tip": "💡 TIPP: Kunde kann jede XRPL-Wallet verwenden — Xaman, GemWallet, Crossmark usw.", "s54_title": "5.4 Zahlungsbestätigung", "s54_c1": "✅ \"Payment received!\" — Zahlung eingegangen", "s54_c2": "TX-Hash zur Verifizierung auf dem XRPL Explorer", "s54_c3": "\"New payment\" — sofort die nächste Zahlung annehmen", "s6_title": "6. Zahlungshistorie und Statistiken", "s6_p1": "Am unteren Rand des Hauptbildschirms befindet sich eine Liste der letzten Zahlungen mit Datum, Uhrzeit, Fiat-Betrag und Transaktions-Hash.", "s6_p2": "Der Tab \  "💶 法币 → XRP — 法币输入并自动换算", "s52_title": "5.2 生成二维码", "s52_c1": "点击 \"GENERATE PAYMENT\"", "s52_c2": "二维码包含地址、金额、标签和描述", "s52_c3": "状态显示 \"⏳ Waiting for payment...\"", "s52_c4": "二维码下方显示收款地址和校验和", "s53_title": "5.3 客户付款", "s53_c1": "客户在手机上打开 Xaman", "s53_c2": "扫描二维码", "s53_c3": "查看详情并确认", "s53_tip": "💡 提示：客户可以使用任何 XRPL 钱包——Xaman、GemWallet、Crossmark 等。", "s54_title": "5.4 付款确认", "s54_c1": "✅ \"Payment received!\" — 付款已接受", "s54_c2": "TX hash 用于在 XRPL Explorer 上验证", "s54_c3": "\"New payment\" — 立即接受下一笔", "s6_title": "6. 付款历史和统计", "s6_p1": "主屏幕底部是最近收到的付款列表，显示日期、时间、法币金额和交易哈希。", "s6_p2": "\"统计\" 选项卡显示总营业额、交易数量等。数据可导出为 CSV。", "s7_title": "7. 故障排除", "s7_p1": "汇率不加载：", "s7_c1": "检查网络连接", "s7_c2": "点击 \"Refresh rates\"", "s7_c3": "等待一分钟后重试", "s7_p2": "WebSocket 不连接：", "s7_d1": "检查网络连接", "s7_d2": "点击 \"Connect\"", "s7_d3": "验证 XRPL 地址正确性", "s7_p3": "付款未收到：", "s7_e1": "用 TX hash 在 livenet.xrpl.org 上验证", "s7_e2": "检查设置中的 XRPL 地址", "s7_e3": "检查付款容差设置", "s7_p4": "二维码未生成 / API 错误：", "s7_f1": "验证 API Key 和 API Secret", "s7_f2": "在 apps.xaman.dev 检查应用有效性", "s7_f3": "API Secret 丢失时生成新的", "s8_title": "8. 支持", "s8_p1": "我们随时为您服务：", "s8_tg": "📧 Telegram：", "s8_chat": "💬 在线聊天：", "footer": "© 2026 XRPL POS | 版权所有 | xrplpos.cz"}, "es": {"title": "XRPL POS — Tutorial", "h_main": "⚡ XRPL POS", "h_sub": "Manual de usuario completo", "h_sub2": "Desde la instalación de Xaman hasta el primer pago", "h_ver": "Versión 1.0 | 2026 | www.xrplpos.cz", "toc": "Tabla de contenidos", "toc1": "1. Introducción", "toc2": "2. Instalación de Xaman", "toc21": "2.1 Descarga", "toc22": "2.2 Crear billetera", "toc23": "2.3 Copia de seguridad", "toc3": "3. Configuración API Xaman", "toc31": "3.1 Inicio de sesión", "toc32": "3.2 Crear app y obtener claves API", "toc33": "3.3 Configurar claves API en XRPL POS", "toc4": "4. Instalación de XRPL POS", "toc41": "4.1 Abrir app", "toc42": "4.2 Configurar dirección XRP", "toc43": "4.3 Moneda y configuraciones", "toc44": "4.4 Activar licencia", "toc5": "5. Aceptar pagos", "toc51": "5.1 Ingresar monto", "toc52": "5.2 Generar QR", "toc53": "5.3 Pago del cliente", "toc54": "5.4 Confirmación", "toc6": "6. Historial y estadísticas", "toc7": "7. Solución de problemas", "toc8": "8. Soporte", "s1_title": "1. Introducción", "s1_p1": "XRPL POS es un punto de venta web para aceptar pagos XRP directamente en la billetera. Sin instalación — funciona en el navegador.", "s1_adv": "Ventajas clave:", "s1_a1": "Sin comisiones (solo tarifa de red ~0.00001 XRP)", "s1_a2": "Pagos instantáneos en 3–5 segundos", "s1_a3": "Conversión automática de fiat a XRP", "s1_a4": "Monedas: CZK, USD, EUR, GBP, HUF, PLN, CHF, JPY", "s1_a5": "Código QR para escaneo fácil", "s1_a6": "Historial con enlace a blockchain", "s1_need": "Necesitarás:", "s1_n1": "Billetera Xaman (XUMM) en el móvil", "s1_n2": "Dirección XRP (activada con 2 XRP de reserva)", "s1_n3": "Claves API de Xaman Developer Console", "s1_n4": "Acceso a internet", "s2_title": "2. Instalación de Xaman", "s2_p1": "Xaman (antes XUMM) es la billetera self-custody más popular para XRP Ledger.", "s2_p2": "Xaman está disponible gratis para Android e iOS.", "s21_title": "2.1 Descarga", "s21_c1": "Abre xaman.app/download en el navegador", "s21_c2": "Haz clic en Google Play o App Store", "s21_c3": "Instala normalmente", "s21_tip": "💡 CONSEJO: Descarga Xaman solo desde xaman.app oficial.", "s22_title": "2.2 Crear billetera", "s22_c1": "Abre la app Xaman", "s22_c2": "Selecciona \"Create a new account\"", "s22_c3": "La app genera tu dirección XRP única (empieza con \"r\")", "s22_c4": "Copia la dirección — la necesitarás en XRPL POS", "s22_warn": "⚠️ La nueva billetera necesita 2 XRP para activarse. Sin ese saldo no se reciben pagos.", "s23_title": "2.3 Copia de seguridad", "s23_c1": "Xaman te pedirá guardar \"Secret Numbers\" (24 números)", "s23_c2": "Escríbelos en papel y guárdalos en lugar seguro", "s23_c3": "Nunca los envíes ni compartas", "s23_warn": "⚠️ Sin copia de seguridad no se puede recuperar la billetera si pierdes el teléfono!", "s3_title": "3. Configuración API Xaman", "s3_p1": "La API de Xaman permite a XRPL POS enviar solicitudes de pago a la billetera del cliente en tiempo real.", "s31_title": "3.1 Inicio de sesión", "s31_c1": "Abre apps.xaman.dev", "s31_c2": "Haz clic en \"Sign in with Xaman\"", "s31_c3": "Aparece un QR — escanéalo con Xaman", "s31_c4": "Confirma en la app Xaman", "s31_c5": "El navegador iniciará sesión automáticamente", "s32_title": "3.2 Crear app y obtener claves API", "s32_p1": "Verás un panel vacío tras el primer login.", "s32_c1": "Haz clic en \"Create new application\"", "s32_c2": "Ingresa el nombre (ej. \"XRPL POS Tienda\")", "s32_c3": "Ingresa la descripción", "s32_c4": "Sube un logo opcionalmente", "s32_c5": "Haz clic en \"Create application\"", "s32_p2": "Se mostrarán tus claves API:", "s32_warn": "⚠️ El API Secret se muestra UNA SOLA VEZ. ¡Cópialo inmediatamente!", "s32_k1": "API Key — identificador público (siempre visible)", "s32_k2": "API Secret — clave privada (no visible después de cerrar)", "s32_p3": "En Settings puedes ver el API Key y generar nuevo API Secret cuando lo necesites.", "s33_title": "3.3 Configurar claves API en XRPL POS", "s33_p1": "Ingresa todo en la configuración de XRPL POS (pestaña Configuración, ícono engranaje).", "s33_step1": "Paso 1 — Dirección XRP del destinatario", "s33_s1p": "Tu dirección XRP es el identificador de tu billetera. Todos los pagos llegan aquí.", "s33_c1": "Ve a la pestaña \"Configuración\" (engranaje abajo)", "s33_c2": "En \"🔑 WALLET\" encuentra el campo \"Dirección XRP\"", "s33_c3": "Copia tu dirección XRP desde Xaman", "s33_c4": "La dirección siempre empieza con \"r\" — ej: rEyyuAVenfbZKkCWb6...", "s33_c5": "Pega la dirección en el campo", "s33_c6": "Opcionalmente ingresa \"Destination Tag\" para pagos a exchanges", "s33_w1": "⚠️ Ingresa la dirección exacta — error significa que los pagos no llegarán!", "s33_t1": "💡 CONSEJO: Copia la dirección directamente de Xaman.", "s33_step2": "Paso 2 — Cl
